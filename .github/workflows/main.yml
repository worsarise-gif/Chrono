name: Auto-Merge Jules PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    # Targets the exact bot name found in your commit history
    if: github.actor == 'google-labs-jules[bot]' 
    steps:
      - name: Auto-merge PR
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          # Approves the PR to bypass basic branch protection rules
          gh pr review --approve "$PR_URL"
          # Squashes and merges the code into your main branch
          gh pr merge --auto --squash "$PR_URL"
